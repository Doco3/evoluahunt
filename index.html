<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoluaHunt - Prospecção Inteligente</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #080a0f; 
            color: #cbd5e1;
            margin: 0;
        }

        .glass-panel { 
            background: rgba(13, 17, 23, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        #loader { 
            position: fixed; inset: 0; 
            display: flex; align-items: center; justify-content: center; 
            background: #080a0f; z-index: 9999; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 40px; height: 40px; 
            border: 3px solid #1e1b4b; border-top-color: #6366f1; 
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        
        .tab-active { background: #4f46e5; color: white; font-weight: bold; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================================
        // 🚀 CONFIGURAÇÃO PARA VERCEL (CHAVES APLICADAS) 🚀
        // ==========================================================
        
        const VERCEL_GEMINI_KEY = "AIzaSyDPzPjyijRbzFswEd9vrVub7tpUlJTrYEE"; 

        const VERCEL_FIREBASE_CONFIG = {
            apiKey: "AIzaSyCvyPlMgdZMO_vDLFDzxGqnFTlvgVRypnY",
            authDomain: "evoluahunt.firebaseapp.com",
            projectId: "evoluahunt",
            storageBucket: "evoluahunt.firebasestorage.app",
            messagingSenderId: "271300824744",
            appId: "1:271300824744:web:4e96ef33a34f1823627c9d",
            measurementId: "G-LGQ4B35WFB"
        }; 

        // ==========================================================

        const getEnvironmentData = () => {
            let config = null;
            let aId = 'evolua-hunt-standalone';

            try {
                if (typeof __firebase_config !== 'undefined') config = JSON.parse(__firebase_config);
                if (typeof __app_id !== 'undefined') aId = __app_id;
            } catch (e) {}

            return { 
                config: config || VERCEL_FIREBASE_CONFIG, 
                aId 
            };
        };

        const { config, aId } = getEnvironmentData();

        const App = () => {
            const [user, setUser] = useState(null);
            const [leads, setLeads] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('discovery');
            const [isMining, setIsMining] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [showSendModal, setShowSendModal] = useState(false);
            const [selectedLead, setSelectedLead] = useState(null);
            const [searchSector, setSearchSector] = useState('');
            const [error, setError] = useState(null);
            const [aiBubble, setAiBubble] = useState({ show: false, text: "", type: 'info' });

            const contacts = [
                { name: 'Doco', phone: '5511989510868' },
                { name: 'Matheus', phone: '5511999999999' },
                { name: 'Rafael (Safra)', phone: '5511988888888' }
            ];

            useEffect(() => {
                const l = document.getElementById('loader');
                if (l) l.style.display = 'none';

                if (!config) {
                    setError("Configuração do Firebase ausente!");
                    setLoading(false);
                    return;
                }

                if (!firebase.apps.length) firebase.initializeApp(config);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await firebase.auth().signInWithCustomToken(__initial_auth_token);
                        } else {
                            await firebase.auth().signInAnonymously();
                        }
                    } catch (err) { console.error("Erro Auth:", err); }
                };
                initAuth();
                return firebase.auth().onAuthStateChanged(setUser);
            }, []);

            useEffect(() => {
                if (!user || !config) return;
                setLoading(true);
                const ref = firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads');
                return ref.onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLeads(data.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setLoading(false);
                }, (err) => {
                    console.error("Erro Firestore:", err);
                    setLoading(false);
                });
            }, [user]);

            const cleanAIResponse = (text) => {
                if (!text) return "";
                return text.replace(/```json/g, "").replace(/```/g, "").trim();
            };

            const callGemini = async (prompt, search = false) => {
                const isInternal = (typeof apiKey !== 'undefined' && apiKey !== "");
                const currentKey = isInternal ? apiKey : VERCEL_GEMINI_KEY;
                
                // Lista alargada de modelos para evitar 404 no Vercel
                const modelsToTry = isInternal 
                    ? ["gemini-2.5-flash-preview-09-2025", "gemini-1.5-flash"] 
                    : ["gemini-1.5-flash", "gemini-pro"];
                
                for (const modelId of modelsToTry) {
                    // Tenta o endpoint v1beta primeiro para suporte a ferramentas de pesquisa
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${currentKey}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" },
                        ...(search && { tools: [{ "google_search": {} }] })
                    };

                    try {
                        const res = await fetch(url, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload) 
                        });
                        
                        if (res.status === 404) continue;
                        
                        if (!res.ok) {
                            const errInfo = await res.json().catch(() => ({}));
                            throw new Error(`Erro HTTP ${res.status}`);
                        }

                        const data = await res.json();
                        const rawText = data.candidates[0].content.parts[0].text;
                        return JSON.parse(cleanAIResponse(rawText));
                    } catch (e) {
                        console.error(`Falha no modelo ${modelId}:`, e);
                        if (modelId === modelsToTry[modelsToTry.length - 1]) throw e;
                    }
                }
            };

            const startMining = async (forcedSector = null) => {
                const target = forcedSector || searchSector;
                if (!user || !target) return;
                
                setIsMining(true);
                // Atualiza a bolha para estado de carregamento e remove botões
                setAiBubble({ show: true, text: `A Lumina está a rastrear empresas de ${target} no Google...`, type: 'info' });
                
                try {
                    const prompt = `Atue como prospecção B2B de elite no Brasil. Use Google Search e encontre 8 empresas REAIS de "${target}" com faturamento estimado acima de R$ 10M. Retorne um array JSON com: "empresa", "cnae", "faturamento", "status": "Novo", "score": (0-100). Responda em Português do Brasil.`;
                    const results = await callGemini(prompt, true);
                    
                    if (results && Array.isArray(results)) {
                        const ref = firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads');
                        for (const l of results) {
                            await ref.add({ ...l, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                        }
                        setAiBubble({ show: true, text: `Sucesso! Adicionei ${results.length} leads de ${target} ao radar.`, type: 'success' });
                    }
                } catch (e) { 
                    console.error(e);
                    setAiBubble({ show: true, text: "Erro ao minerar. Por favor, tente novamente em alguns segundos.", type: 'error' }); 
                } finally { 
                    setIsMining(false); 
                    setSearchSector(''); 
                }
            };

            const validateLead = async (id, name) => {
                if (!user) return;
                setIsProcessing(true);
                try {
                    const prompt = `Analise a empresa "${name}" no Brasil via Google Search. Retorne JSON: "decisor" (nome CEO/CFO real), "cargo", "contato" (telefone), "email" (e-mail corporativo), "gancho" (abordagem estratégica Banco Safra), "score" (0-100). Responda em Português do Brasil.`;
                    const data = await callGemini(prompt, true);
                    if (data) {
                        await firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads').doc(id).update({ 
                            ...data, 
                            status: 'Enriquecido',
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (e) { console.error(e); } finally { setIsProcessing(false); }
            };

            const deleteLead = async (id) => {
                try {
                    await firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads').doc(id).delete();
                } catch (e) { console.error(e); }
            };

            const send = (p) => {
                if (!selectedLead) return;
                const msg = `*Lead EvoluaHunt*\n\n*Empresa:* ${selectedLead.empresa}\n*Decisor:* ${selectedLead.decisor}\n*Cargo:* ${selectedLead.cargo}\n*Contato:* ${selectedLead.contato || 'N/A'}\n*Email:* ${selectedLead.email || 'N/A'}\n*Gancho:* ${selectedLead.gancho}\n\nEnviado via Evolua Digital.`;
                window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, '_blank');
                setShowSendModal(false);
            };

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [leads, activeTab, showSendModal, aiBubble]);

            if (error) return (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="glass-panel p-8 rounded-3xl max-w-md border-red-500/20">
                        <i data-lucide="alert-circle" className="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                        <h2 className="text-xl font-bold text-white mb-2">Erro de Configuração</h2>
                        <p className="text-slate-400 text-sm mb-6">{error}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 md:pb-0 flex flex-col md:flex-row overflow-x-hidden">
                    {/* BARRA LATERAL (Desktop) */}
                    <aside className="fixed left-0 top-0 h-full w-64 bg-[#0d1117] border-r border-white/5 p-6 z-20 hidden md:flex flex-col shadow-2xl">
                        <div className="flex items-center gap-3 mb-12">
                            <img src="https://imgur.com/W0gDq47.png" className="w-12 h-12 rounded-xl object-contain bg-white/5 p-1" alt="Logo" />
                            <div>
                                <h1 className="text-xl font-bold text-white tracking-tight">Evolua<span className="text-indigo-400">Hunt</span></h1>
                                <p className="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Digital Prospecting</p>
                            </div>
                        </div>
                        <nav className="space-y-1">
                            <button onClick={()=>setActiveTab('discovery')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab==='discovery'?'tab-active':'text-slate-500 hover:bg-white/5'}`}>
                                <i data-lucide="search" className="w-5 h-5"></i> Radar de Leads
                            </button>
                            <button onClick={()=>setActiveTab('pipeline')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab==='pipeline'?'tab-active':'text-slate-500 hover:bg-white/5'}`}>
                                <i data-lucide="bar-chart-3" className="w-5 h-5"></i> Pipeline
                            </button>
                        </nav>
                        <div className="mt-auto bg-indigo-500/5 p-4 rounded-2xl border border-indigo-500/10">
                            <div className="flex items-center gap-2 mb-2">
                                <div className="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
                                <span className="text-[10px] uppercase font-bold text-indigo-400">Lumina Core Ativa</span>
                            </div>
                            <p className="text-[10px] text-slate-500 italic">Pronta para minerar o mercado.</p>
                        </div>
                    </aside>

                    {/* NAVEGAÇÃO MOBILE */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/5 p-2 flex justify-around md:hidden z-50">
                        <button onClick={()=>setActiveTab('discovery')} className={`flex flex-col items-center p-2 ${activeTab==='discovery'?'text-indigo-400':'text-slate-500'}`}><i data-lucide="search" className="w-6 h-6"></i><span className="text-[10px]">Radar</span></button>
                        <button onClick={()=>setActiveTab('pipeline')} className={`flex flex-col items-center p-2 ${activeTab==='pipeline'?'text-indigo-400':'text-slate-500'}`}><i data-lucide="bar-chart-3" className="w-6 h-6"></i><span className="text-[10px]">Pipeline</span></button>
                    </nav>

                    <main className="flex-1 md:ml-64 p-4 md:p-10">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <div><h2 className="text-2xl font-bold text-white tracking-tight">Consola EvoluaHunt</h2><p className="text-slate-500 text-sm">Seu radar inteligente de prospecção.</p></div>
                            <div className="bg-[#0d1117] border border-white/5 px-6 py-3 rounded-2xl text-right shadow-xl">
                                <p className="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Share Estimado</p>
                                <p className="text-lg font-bold text-indigo-400">R$ {(leads.filter(l=>l.score>85).length*3500).toLocaleString('pt-BR')}</p>
                            </div>
                        </header>

                        {activeTab === 'discovery' && (
                            <div className="space-y-6 animate-in fade-in duration-700">
                                <section className="bg-[#11141b] p-6 rounded-3xl border border-white/5 shadow-2xl relative overflow-hidden group">
                                    <div className="flex items-center gap-2 mb-4 text-indigo-400 uppercase text-[10px] font-black tracking-widest relative z-10"><i data-lucide="sparkles" className="w-3 h-3 group-hover:animate-pulse"></i> Mineração Profunda</div>
                                    <div className="flex flex-col md:flex-row gap-4 relative z-10">
                                        <input type="text" value={searchSector} onChange={e=>setSearchSector(e.target.value)} placeholder="Digite um setor (TI, Logística, Agro...)" className="flex-1 bg-[#080a0f] border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-indigo-500 font-medium" />
                                        <button onClick={()=>startMining()} disabled={isMining||!searchSector} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95 min-w-[140px]">
                                            {isMining ? <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> : <i data-lucide="zap" className="w-5 h-5"></i>} 
                                            <span>{isMining ? "A minerar..." : "Explorar"}</span>
                                        </button>
                                    </div>
                                </section>

                                <div className="grid gap-4">
                                    {loading ? <div className="py-20 text-center opacity-30 italic">A sincronizar base de dados...</div> : leads.map(l => (
                                        <div key={l.id} className="bg-[#0d1117] border border-white/5 rounded-3xl p-5 md:p-6 hover:border-indigo-500/40 transition-all shadow-sm">
                                            <div className="flex flex-col xl:flex-row justify-between items-start gap-6">
                                                <div className="flex-1 w-full">
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <h4 className="text-lg font-bold text-white group-hover:text-indigo-400 transition-colors">{l.empresa}</h4>
                                                        <span className={`text-[9px] px-2 py-0.5 rounded border font-black uppercase ${l.status==='Enriquecido'?'border-indigo-500/30 text-indigo-400 bg-indigo-500/5':'border-white/10 text-slate-500'}`}>{l.status}</span>
                                                    </div>
                                                    <p className="text-[10px] text-slate-500 font-mono tracking-tighter uppercase mb-4">{l.cnae} • <span className="text-indigo-400 font-bold">{l.faturamento}</span></p>
                                                    
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 p-4 bg-white/[0.02] rounded-2xl border border-white/5 text-sm">
                                                        <div>
                                                            <p className="text-[9px] uppercase font-black opacity-60 tracking-widest mb-1">Decisor & Contacto</p>
                                                            <p className="font-bold text-slate-200">{l.decisor || "Não validado"}</p>
                                                            {l.contato && <p className="text-indigo-400 text-[10px] mt-1 font-medium">{l.contato}</p>}
                                                            {l.email && <p className="text-slate-500 text-[10px] truncate">{l.email}</p>}
                                                        </div>
                                                        <div className="hidden sm:block">
                                                            <p className="text-[9px] uppercase font-black opacity-60 tracking-widest mb-1">Score de Match</p>
                                                            <div className="flex items-center gap-3">
                                                                <span className="font-mono text-white">{l.score}%</span>
                                                                <div className="h-1.5 flex-1 bg-white/10 rounded-full overflow-hidden max-w-[80px]">
                                                                    <div className="h-full bg-indigo-500 shadow-[0_0_8px_indigo]" style={{width:`${l.score}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="hidden md:block">
                                                            <p className="text-[9px] uppercase font-black opacity-60 tracking-widest mb-1">Cargo</p>
                                                            <p className="text-xs text-indigo-400/80 font-bold">{l.cargo || "N/A"}</p>
                                                        </div>
                                                    </div>

                                                    {l.gancho && (
                                                        <div className="mt-4 flex gap-3 bg-indigo-500/[0.03] p-4 rounded-2xl border border-indigo-500/10 italic text-xs md:text-sm text-slate-400 leading-relaxed">
                                                            <i data-lucide="bot" className="w-4 h-4 text-indigo-500 shrink-0 mt-0.5"></i>
                                                            "{l.gancho}"
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex flex-row xl:flex-col gap-2 w-full xl:w-40 mt-4 xl:mt-0">
                                                    {!l.decisor ? (
                                                        <button onClick={()=>validateLead(l.id, l.empresa)} disabled={isProcessing} className="flex-1 bg-white/5 hover:bg-indigo-500 text-white p-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs border border-white/10 transition-all active:scale-95 disabled:opacity-50">
                                                            {isProcessing ? <i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i> : <i data-lucide="shield-check" className="w-4 h-4"></i>}
                                                            Validar
                                                        </button>
                                                    ) : (
                                                        <button onClick={()=>{setSelectedLead(l);setShowSendModal(true)}} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs shadow-lg active:scale-95 transition-all">
                                                            <i data-lucide="share-2" className="w-4 h-4"></i>
                                                            Enviar
                                                        </button>
                                                    )}
                                                    <button onClick={()=>deleteLead(l.id)} className="bg-red-600/5 hover:bg-red-600/20 text-red-500/50 p-3 rounded-xl transition-all">
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab !== 'discovery' && <div className="py-40 text-center opacity-10 uppercase italic font-black text-2xl tracking-tighter">Módulo em Construção</div>}
                    </main>

                    {/* MODAL DE ENVIO */}
                    {showSendModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-[#11141b] border border-white/10 w-full max-w-sm rounded-3xl p-8 shadow-2xl animate-in zoom-in duration-300">
                                <div className="flex justify-between items-center mb-6 text-white">
                                    <h2 className="text-xl font-bold tracking-tight">Enviar para:</h2>
                                    <button onClick={()=>setShowSendModal(false)} className="text-slate-500 hover:text-white transition-colors"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {contacts.map((c, i) => (
                                        <button key={i} onClick={()=>send(c.phone)} className="w-full bg-white/5 hover:bg-indigo-600 text-white p-4 rounded-2xl flex items-center justify-between font-bold group transition-all">
                                            <div className="flex items-center gap-3">
                                                <i data-lucide="message-square" className="w-4 h-4 text-indigo-400 group-hover:text-white"></i>
                                                {c.name}
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 group-hover:translate-x-1 transition-all"></i>
                                        </button>
                                    ))}
                                    <button onClick={()=>setShowSendModal(false)} className="w-full text-slate-500 text-sm mt-4 font-medium">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BOT DA LUMINA */}
                    <div className="fixed bottom-24 md:bottom-10 right-6 z-40">
                        {aiBubble.show && (
                            <div className="absolute bottom-full right-0 mb-4 w-72 p-5 bg-[#0d1117] border border-indigo-500/30 rounded-2xl shadow-2xl animate-in slide-in-from-bottom-2">
                                <div className="bg-[#0d1117] border border-indigo-500/30 p-5 rounded-2xl shadow-2xl relative">
                                    <button onClick={() => setAiBubble({ ...aiBubble, show: false })} className="absolute top-3 right-3 text-slate-600 hover:text-white transition-colors"><i data-lucide="x" className="w-3 h-3"></i></button>
                                    <div className="flex items-center gap-2 mb-3 text-indigo-400 font-black text-[10px] uppercase tracking-widest"><i data-lucide="sparkles" className="w-3 h-3"></i> Lumina Insight</div>
                                    <p className="text-xs text-white leading-relaxed mb-4">{aiBubble.text}</p>
                                    
                                    {/* UI FIX: Verifica explicitamente o tipo 'question' para mostrar botões */}
                                    {aiBubble.type === 'question' && (
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => startMining('Logística e Armazéns')} 
                                                className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] py-2 rounded-lg font-bold shadow-lg transition-all"
                                            >
                                                Sim, vamos!
                                            </button>
                                            <button onClick={()=>setAiBubble({show:false})} className="flex-1 bg-white/5 text-slate-400 text-[10px] py-2 rounded-lg font-bold">Agora não</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        <button 
                            onClick={()=> {
                                if (aiBubble.show) {
                                    setAiBubble({ show: false, text: "", type: 'info' });
                                } else {
                                    setAiBubble({
                                        show:true, 
                                        text: "Detetei que o setor de Logística está com score de fechamento alto no Safra. Quer minerar agora?",
                                        type: 'question'
                                    });
                                }
                            }} 
                            className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-[0_0_20px_rgba(79,70,229,0.3)] active:scale-90 transition-all ring-4 ring-white/5 group"
                        >
                            <i data-lucide="bot" className="w-7 h-7 group-hover:rotate-12 transition-transform"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        const r = () => { 
            root.render(<App />); 
            setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 500); 
        };
        r();
    </script>
</body>
</html>
