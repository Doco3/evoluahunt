<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoluaHunt - Prospecção Inteligente</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase (Compat para facilidade de arquivo único) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #080a0f; 
            color: #cbd5e1;
            margin: 0;
        }

        .glass-panel { 
            background: rgba(13, 17, 23, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        #loader { 
            position: fixed; inset: 0; 
            display: flex; align-items: center; justify-content: center; 
            background: #080a0f; z-index: 9999; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 40px; height: 40px; 
            border: 3px solid #1e1b4b; border-top-color: #6366f1; 
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        
        .tab-active { background: #4f46e5; color: white; font-weight: bold; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================================
        // 🚀 CONFIGURAÇÃO PARA VERCEL (OBRIGATÓRIO PREENCHER) 🚀
        // ==========================================================
        
        // 1. Sua API Key do Gemini (Pegue em: aistudio.google.com)
        const VERCEL_GEMINI_KEY = "AIzaSyDPzPjyijRbzFswEd9vrVub7tpUlJTrYEE"; 

        // 2. Seu objeto Firebase (Pegue no Console do Firebase)
        const firebaseConfig = {
  apiKey: "AIzaSyCvyPlMgdZMO_vDLFDzxGqnFTlvgVRypnY",
  authDomain: "evoluahunt.firebaseapp.com",
  projectId: "evoluahunt",
  storageBucket: "evoluahunt.firebasestorage.app",
  messagingSenderId: "271300824744",
  appId: "1:271300824744:web:4e96ef33a34f1823627c9d",
  measurementId: "G-LGQ4B35WFB"
};

        // ==========================================================

        const getKeys = () => {
            let config = null;
            let gKey = VERCEL_GEMINI_KEY;
            let aId = 'evolua-hunt-standalone';

            try {
                if (typeof __firebase_config !== 'undefined') config = JSON.parse(__firebase_config);
                if (typeof apiKey !== 'undefined' && apiKey !== "") gKey = apiKey;
                if (typeof __app_id !== 'undefined') aId = __app_id;
            } catch (e) {}

            return { config: config || VERCEL_FIREBASE_CONFIG, gKey, aId };
        };

        const { config, gKey, aId } = getKeys();

        const App = () => {
            const [user, setUser] = useState(null);
            const [leads, setLeads] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('discovery');
            const [isMining, setIsMining] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [showSendModal, setShowSendModal] = useState(false);
            const [selectedLead, setSelectedLead] = useState(null);
            const [searchSector, setSearchSector] = useState('');
            const [error, setError] = useState(null);
            const [aiBubble, setAiBubble] = useState({ show: false, text: "", type: 'info', action: null });

            const contacts = [
                { name: 'Doco', phone: '5511989510868' },
                { name: 'Matheus', phone: '5511999999999' },
                { name: 'Rafael (Safra)', phone: '5511988888888' }
            ];

            useEffect(() => {
                const l = document.getElementById('loader');
                if (l) l.style.display = 'none';

                if (!config) {
                    setError("Configuração do Firebase ausente! Abra o index.html e cole seu objeto firebaseConfig na linha 50.");
                    setLoading(false);
                    return;
                }

                if (!firebase.apps.length) firebase.initializeApp(config);

                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await firebase.auth().signInWithCustomToken(__initial_auth_token);
                        } else {
                            await firebase.auth().signInAnonymously();
                        }
                    } catch (err) { console.error(err); }
                };
                init();
                return firebase.auth().onAuthStateChanged(setUser);
            }, []);

            useEffect(() => {
                if (!user || !config) return;
                setLoading(true);
                const ref = firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads');
                return ref.onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLeads(data.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setLoading(false);
                });
            }, [user]);

            const callGemini = async (prompt, search = false) => {
                if (!gKey || gKey === "COLE_SUA_CHAVE_AQUI") {
                    alert("Gemini Key não configurada na linha 46!");
                    return null;
                }
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${gKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" },
                    ...(search && { tools: [{ "google_search": {} }] })
                };

                for (let i = 0; i < 5; i++) {
                    try {
                        const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                        if (!res.ok) throw new Error(res.status);
                        const data = await res.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (e) {
                        if (i === 4) throw e;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            };

            const startMining = async (s) => {
                const target = s || searchSector;
                if (!user || !target) return;
                setIsMining(true);
                setAiBubble({ show: true, text: `Rastreando empresas de ${target} no Google...`, type: 'info' });
                try {
                    const prompt = `Atue como prospecção B2B de elite no Brasil. Use Google Search e encontre 8 empresas REAIS de "${target}" com faturamento > R$ 10M. Retorne array JSON: "empresa", "cnae", "faturamento", "status": "Novo", "score": (0-100). PT-BR.`;
                    const results = await callGemini(prompt, true);
                    const ref = firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads');
                    for (const l of results) await ref.add({ ...l, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setAiBubble({ show: true, text: `Sucesso! Adicionei ${results.length} leads.`, type: 'success' });
                } catch (e) { setAiBubble({ show: true, text: "Erro na API. Verifique a chave.", type: 'error' }); }
                finally { setIsMining(false); setSearchSector(''); }
            };

            const validate = async (id, name) => {
                if (!user) return;
                setIsProcessing(true);
                try {
                    const prompt = `Analise a empresa "${name}" via Google Search. Retorne JSON: "decisor" (nome CEO/CFO), "cargo", "contato" (telefone), "email", "gancho" (abordagem Banco Safra), "score" (0-100). PT-BR.`;
                    const data = await callGemini(prompt, true);
                    await firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads').doc(id).update({ ...data, status: 'Enriquecido' });
                } catch (e) { console.error(e); } finally { setIsProcessing(false); }
            };

            const send = (p) => {
                const msg = `Lead EvoluaHunt:\n\n*Empresa:* ${selectedLead.empresa}\n*Decisor:* ${selectedLead.decisor}\n*Contato:* ${selectedLead.contato || 'N/A'}\n*Gancho:* ${selectedLead.gancho}\n\nBora fechar?`;
                window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, '_blank');
                setShowSendModal(false);
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [leads, activeTab, showSendModal, aiBubble]);

            if (error) return (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="glass-panel p-8 rounded-3xl max-w-md border-red-500/20">
                        <i data-lucide="alert-circle" className="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                        <h2 className="text-xl font-bold text-white mb-2">Configuração Pendente</h2>
                        <p className="text-slate-400 text-sm mb-6">{error}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 md:pb-0 flex flex-col md:flex-row">
                    {/* SIDEBAR */}
                    <aside className="fixed left-0 top-0 h-full w-64 bg-[#0d1117] border-r border-white/5 p-6 z-20 hidden md:flex flex-col shadow-2xl">
                        <div className="flex items-center gap-3 mb-12">
                            <img src="https://imgur.com/W0gDq47.png" className="w-12 h-12 rounded-xl object-contain bg-white/5 p-1" />
                            <div>
                                <h1 className="text-xl font-bold text-white tracking-tight">Evolua<span className="text-indigo-400">Hunt</span></h1>
                                <p className="text-[9px] text-slate-500 uppercase font-bold">Smart Prospecting</p>
                            </div>
                        </div>
                        <nav className="space-y-1">
                            <button onClick={()=>setActiveTab('discovery')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab==='discovery'?'tab-active':'text-slate-500 hover:bg-white/5'}`}>
                                <i data-lucide="search" className="w-5 h-5"></i> Radar
                            </button>
                            <button onClick={()=>setActiveTab('pipeline')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab==='pipeline'?'tab-active':'text-slate-500 hover:bg-white/5'}`}>
                                <i data-lucide="bar-chart-3" className="w-5 h-5"></i> Pipeline
                            </button>
                        </nav>
                    </aside>

                    {/* MOBILE NAV */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/5 p-2 flex justify-around md:hidden z-50">
                        <button onClick={()=>setActiveTab('discovery')} className={`flex flex-col items-center p-2 ${activeTab==='discovery'?'text-indigo-400':'text-slate-500'}`}><i data-lucide="search" className="w-6 h-6"></i><span className="text-[10px]">Radar</span></button>
                        <button onClick={()=>setActiveTab('pipeline')} className={`flex flex-col items-center p-2 ${activeTab==='pipeline'?'text-indigo-400':'text-slate-500'}`}><i data-lucide="bar-chart-3" className="w-6 h-6"></i><span className="text-[10px]">Pipeline</span></button>
                    </nav>

                    <main className="flex-1 md:ml-64 p-4 md:p-10">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <div><h2 className="text-2xl font-bold text-white">Console EvoluaHunt</h2><p className="text-slate-500 text-sm">Seu radar inteligente B2B.</p></div>
                            <div className="bg-[#0d1117] border border-white/5 px-6 py-3 rounded-2xl text-right shadow-xl"><p className="text-[10px] uppercase font-bold text-slate-500">Forecast Share</p><p className="text-lg font-bold text-indigo-400">R$ {(leads.filter(l=>l.score>85).length*3500).toLocaleString('pt-BR')}</p></div>
                        </header>

                        {activeTab === 'discovery' && (
                            <div className="space-y-6">
                                <section className="bg-[#11141b] p-6 rounded-3xl border border-white/5 shadow-2xl relative overflow-hidden group">
                                    <div className="flex items-center gap-2 mb-4 text-indigo-400 uppercase text-[10px] font-black tracking-widest relative z-10"><i data-lucide="sparkles" className="w-3 h-3 group-hover:animate-pulse"></i> Mineração Profunda</div>
                                    <div className="flex flex-col md:flex-row gap-4 relative z-10">
                                        <input type="text" value={searchSector} onChange={e=>setSearchSector(e.target.value)} placeholder="Setor (TI, Agro, Logística...)" className="flex-1 bg-[#080a0f] border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-indigo-500" />
                                        <button onClick={()=>startMining()} disabled={isMining||!searchSector} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                                            {isMining ? <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> : <i data-lucide="zap" className="w-5 h-5"></i>} <span>Explorar</span>
                                        </button>
                                    </div>
                                </section>

                                <div className="grid gap-4">
                                    {loading ? <div className="py-20 text-center opacity-30 italic">Sincronizando...</div> : leads.map(l => (
                                        <div key={l.id} className="bg-[#0d1117] border border-white/5 rounded-3xl p-5 md:p-6 hover:border-indigo-500/30 transition-all shadow-sm">
                                            <div className="flex flex-col xl:flex-row justify-between items-start gap-6">
                                                <div className="flex-1 w-full">
                                                    <div className="flex items-center gap-3 mb-2"><h4 className="text-lg font-bold text-white">{l.empresa}</h4><span className={`text-[9px] px-2 py-0.5 rounded border font-black uppercase ${l.status==='Enriquecido'?'border-indigo-500/30 text-indigo-400 bg-indigo-500/5':'border-white/10 text-slate-500'}`}>{l.status}</span></div>
                                                    <p className="text-[10px] text-slate-500 font-mono tracking-tighter uppercase mb-4">{l.cnae} • <span className="text-indigo-400 font-bold">{l.faturamento}</span></p>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 p-4 bg-white/[0.02] rounded-2xl border border-white/5 text-sm">
                                                        <div><p className="text-[9px] uppercase font-black opacity-60">Decisor</p><p className="font-bold text-slate-200">{l.decisor || "Pendente"}</p>
                                                            {l.contato && <p className="text-indigo-400 text-[10px] mt-1">{l.contato}</p>}</div>
                                                        <div className="hidden sm:block"><p className="text-[9px] uppercase font-black opacity-60">Match Score</p><div className="flex items-center gap-2"><span className="font-mono text-white">{l.score}%</span><div className="h-1.5 flex-1 bg-white/10 rounded-full overflow-hidden max-w-[80px]"><div className="h-full bg-indigo-500 shadow-[0_0_8px_indigo]" style={{width:`${l.score}%`}}></div></div></div></div>
                                                    </div>
                                                    {l.gancho && <div className="mt-4 flex gap-3 bg-indigo-500/[0.03] p-4 rounded-2xl border border-indigo-500/10 italic text-xs text-slate-400"><i data-lucide="bot" className="w-4 h-4 text-indigo-500 shrink-0"></i>"{l.gancho}"</div>}
                                                </div>
                                                <div className="flex flex-row xl:flex-col gap-2 w-full xl:w-40 mt-4 xl:mt-0">
                                                    {!l.decisor ? <button onClick={()=>validate(l.id, l.empresa)} disabled={isProcessing} className="flex-1 bg-white/5 hover:bg-indigo-500 text-white p-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs border border-white/10 transition-all active:scale-95">{isProcessing?<i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i>:<i data-lucide="shield-check" className="w-4 h-4"></i>}Validar</button>
                                                    : <button onClick={()=>{setSelectedLead(l);setShowSendModal(true)}} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs shadow-lg active:scale-95 transition-all"><i data-lucide="share-2" className="w-4 h-4"></i>Enviar</button>}
                                                    <button onClick={()=>firebase.firestore().collection('artifacts').doc(aId).collection('public').doc('data').collection('leads').doc(l.id).delete()} className="bg-red-600/5 hover:bg-red-600/20 text-red-500/50 p-3 rounded-xl transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab !== 'discovery' && <div className="py-40 text-center opacity-10 uppercase italic font-bold">Módulo em Construção</div>}
                    </main>

                    {/* MODAL SEND */}
                    {showSendModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-[#11141b] border border-white/10 w-full max-w-sm rounded-3xl p-8 shadow-2xl animate-in zoom-in duration-300">
                                <h2 className="text-xl font-bold text-white mb-6">Enviar para:</h2>
                                <div className="space-y-3">
                                    {contacts.map((c, i) => (
                                        <button key={i} onClick={()=>send(c.phone)} className="w-full bg-white/5 hover:bg-indigo-600 text-white p-4 rounded-2xl flex items-center justify-between font-bold group transition-all">{c.name}<i data-lucide="chevron-right" className="w-4 h-4 group-hover:translate-x-1 transition-all"></i></button>
                                    ))}
                                    <button onClick={()=>setShowSendModal(false)} className="w-full text-slate-500 text-sm mt-4">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BOT */}
                    <div className="fixed bottom-24 md:bottom-10 right-6 z-40">
                        {aiBubble.show && (
                            <div className="absolute bottom-full right-0 mb-4 w-72 p-5 bg-[#0d1117] border border-indigo-500/30 rounded-2xl shadow-2xl animate-in slide-in-from-bottom-2">
                                <div className="flex items-center gap-2 mb-3 text-indigo-400 font-black text-[10px] uppercase tracking-widest"><i data-lucide="sparkles" className="w-3 h-3"></i> Lumina Insight</div>
                                <p className="text-xs text-white leading-relaxed mb-4">{aiBubble.text}</p>
                                <div className="flex gap-2"><button onClick={()=>startMining('SaaS e Software')} className="flex-1 bg-indigo-600 text-white text-[10px] py-2 rounded-lg font-bold">Sim!</button><button onClick={()=>setAiBubble({show:false})} className="flex-1 bg-white/5 text-slate-400 text-[10px] py-2 rounded-lg font-bold">Não</button></div>
                            </div>
                        )}
                        <button onClick={()=>setAiBubble({show:true, text: "Setor de Tecnologia está com 80% de match no Safra hoje. Quer minerar empresas de Software?"})} className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-xl active:scale-90 transition-all ring-4 ring-white/5"><i data-lucide="bot" className="w-7 h-7"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        const r = () => { root.render(<App />); setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 500); };
        r();
    </script>
</body>
</html>
